name: Release gem

on:
  release:
    types: ["created"]

jobs:
  gem-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1.288.0
        with:
          ruby-version: 3.4
          bundler: latest
          bundler-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Configure NPM
        # Disable audit to improve the build performance
        run: npm set audit false
      - uses: rubygems/release-gem@1c162a739e8b4cb21a676e97b087e8268d8fc40b # v1.1.2

  image-release:
    runs-on: ubuntu-latest
    needs: gem-release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Strip v prefix
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: Build Docker image
        run: |
          docker build . \
          --tag "ghcr.io/$GITHUB_ACTOR/mihari:latest" \
          --tag "ghcr.io/$GITHUB_ACTOR/mihari:${{ env.VERSION }}" \
          --build-arg VERSION=${{ env.VERSION }}
      - name: Push Docker image
        run: |
          docker push "ghcr.io/$GITHUB_ACTOR/mihari:latest"
          docker push "ghcr.io/$GITHUB_ACTOR/mihari:${{ env.VERSION }}"
